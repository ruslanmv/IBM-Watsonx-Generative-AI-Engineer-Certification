name: Build study-guide PDF

on:
  push:
    branches: [main, master]
    paths:
      - 'book/**'
      - '.github/workflows/build-book.yml'
  pull_request:
    paths:
      - 'book/**'
  workflow_dispatch:

permissions:
  contents: write   # needed to publish the rolling release

jobs:
  build:
    name: Compile main.pdf (KDP letter)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render SVG figures to PDF
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends librsvg2-bin
          shopt -s nullglob
          for svg in book/assets/figures/*.svg; do
            rsvg-convert -f pdf -o "${svg%.svg}.pdf" "$svg"
          done
          ls -la book/assets/figures/

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: book
          latexmk_use_xelatex: false
          latexmk_shell_escape: false
          args: "-interaction=nonstopmode -halt-on-error -file-line-error -pdf -bibtex"

      - name: Rename PDF
        run: |
          cp book/main.pdf book/c1000-185-study-guide.pdf
          ls -lh book/c1000-185-study-guide.pdf

      - name: Upload PDF as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: c1000-185-study-guide
          path: book/c1000-185-study-guide.pdf
          if-no-files-found: error
          retention-days: 30

      # Publish a rolling release on push to main so the PDF is downloadable
      # at a stable URL — no GitHub login required:
      #   https://github.com/<owner>/<repo>/releases/latest/download/c1000-185-study-guide.pdf
      - name: Publish rolling "book-latest" release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: book-latest
          name: "Study Guide — latest build"
          body: |
            Auto-built from commit ${{ github.sha }} on `${{ github.ref_name }}`.
            Download the PDF below or use this stable URL:

            https://github.com/${{ github.repository }}/releases/latest/download/c1000-185-study-guide.pdf
          files: book/c1000-185-study-guide.pdf
          make_latest: "true"
