<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Helvetica, Arial, sans-serif">
  <rect width="800" height="480" fill="#ffffff"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#003865">LoRA — Low-Rank Adaptation</text>
  <text x="400" y="54" text-anchor="middle" font-size="13" fill="#525F6B">Freeze the big matrix W; learn a tiny rank-r update ΔW = A·B.</text>

  <!-- Equation visual: W (big) + A·B (tiny) -->
  <g>
    <!-- Frozen W -->
    <rect x="60" y="110" width="200" height="200" fill="#003865"/>
    <text x="160" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#003865">W (frozen)</text>
    <text x="160" y="218" text-anchor="middle" font-size="40" font-weight="700" fill="#ffffff">W</text>
    <text x="160" y="248" text-anchor="middle" font-size="12" fill="#ffffff">d × d</text>
    <text x="160" y="330" text-anchor="middle" font-size="11" fill="#525F6B">≈ billions of parameters</text>
    <text x="160" y="346" text-anchor="middle" font-size="11" fill="#525F6B">never touched</text>
  </g>

  <!-- Plus sign -->
  <text x="296" y="220" text-anchor="middle" font-size="44" font-weight="700" fill="#0072C6">+</text>

  <!-- A · B (trainable) -->
  <g>
    <!-- A is tall thin -->
    <rect x="340" y="110" width="40" height="200" fill="#8A3FFC"/>
    <text x="360" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#8A3FFC">A</text>
    <text x="360" y="220" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">A</text>
    <text x="360" y="248" text-anchor="middle" font-size="11" fill="#5A189A">d × r</text>
    <!-- multiply dot -->
    <circle cx="408" cy="210" r="6" fill="#0072C6"/>
    <!-- B is short wide -->
    <rect x="424" y="190" width="200" height="40" fill="#009E60"/>
    <text x="524" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#009E60">B</text>
    <text x="524" y="216" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">B</text>
    <text x="638" y="216" text-anchor="middle" font-size="11" fill="#005934">r × d</text>
  </g>

  <!-- Equals -->
  <text x="668" y="220" text-anchor="middle" font-size="44" font-weight="700" fill="#0072C6">=</text>

  <!-- W' -->
  <g>
    <rect x="700" y="110" width="90" height="200" fill="none" stroke="#003865" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="745" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#003865">W'</text>
    <text x="745" y="220" text-anchor="middle" font-size="28" font-weight="700" fill="#003865">W'</text>
    <text x="745" y="246" text-anchor="middle" font-size="10" fill="#525F6B">used at</text>
    <text x="745" y="260" text-anchor="middle" font-size="10" fill="#525F6B">inference</text>
  </g>

  <!-- Math line -->
  <text x="400" y="382" text-anchor="middle" font-size="16" fill="#003865">W' = W + α · (A · B)</text>
  <text x="400" y="402" text-anchor="middle" font-size="11" fill="#525F6B" font-style="italic">α (alpha) scales the update at inference time</text>

  <!-- Comparison bar -->
  <rect x="40" y="420" width="720" height="40" rx="8" fill="#F0F4FA" stroke="#0072C6" stroke-width="1"/>
  <text x="56" y="446" font-size="11" fill="#003865">
    <tspan font-weight="700">Trainable params:</tspan> Full FT ≈ 8B · LoRA r=16 ≈ <tspan font-weight="700" fill="#8A3FFC">4M (~0.05%)</tspan> · QLoRA = LoRA on a 4-bit-quantised W (less VRAM still)
  </text>
</svg>
