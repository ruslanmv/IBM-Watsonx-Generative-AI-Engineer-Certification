<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Helvetica, Arial, sans-serif">
  <rect width="800" height="480" fill="#ffffff"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#003865">Reading Roadmap</text>

  <!-- Start node -->
  <rect x="340" y="56" width="120" height="40" rx="20" fill="#0072C6"/>
  <text x="400" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Start here</text>

  <!-- Decision diamond -->
  <polygon points="400,116 540,176 400,236 260,176" fill="#F0F4FA" stroke="#0072C6" stroke-width="2"/>
  <text x="400" y="170" text-anchor="middle" font-size="12" fill="#003865" font-weight="700">Reader profile?</text>
  <text x="400" y="188" text-anchor="middle" font-size="11" fill="#525F6B">(pick the closest)</text>

  <!-- arrow from Start to diamond -->
  <line x1="400" y1="96" x2="400" y2="114" stroke="#0072C6" stroke-width="2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0072C6"/>
    </marker>
  </defs>

  <!-- Four paths -->
  <g font-size="10" fill="#003865" text-anchor="middle">
    <!-- New to AI -->
    <rect x="20"  y="270" width="170" height="180" rx="10" fill="#ffffff" stroke="#8A3FFC" stroke-width="2"/>
    <text x="105" y="290" font-size="12" font-weight="700" fill="#8A3FFC">New to AI</text>
    <text x="105" y="312">Ch. 1 — Foundations</text>
    <text x="105" y="328">Ch. 2 — Prompting</text>
    <text x="105" y="344">Ch. 4 — RAG</text>
    <text x="105" y="360">Ch. 3 — Fine-tune</text>
    <text x="105" y="376">Ch. 5 — Deploy</text>
    <text x="105" y="392">Ch. 6 — Integrate</text>
    <text x="105" y="416" font-style="italic">→ App. D, A, B, E</text>
    <text x="105" y="436" font-size="9" fill="#525F6B">Long path, full coverage</text>

    <!-- Experienced ML -->
    <rect x="210" y="270" width="170" height="180" rx="10" fill="#ffffff" stroke="#0072C6" stroke-width="2"/>
    <text x="295" y="290" font-size="12" font-weight="700" fill="#0072C6">Experienced ML</text>
    <text x="295" y="312">Skim Ch. 1</text>
    <text x="295" y="328" font-weight="700">Ch. 3 — Fine-tune ★</text>
    <text x="295" y="344">Ch. 4 — RAG</text>
    <text x="295" y="360">Ch. 5 — Deploy</text>
    <text x="295" y="376">Ch. 6 — Integrate</text>
    <text x="295" y="416" font-style="italic">→ Appendix D</text>
    <text x="295" y="436" font-size="9" fill="#525F6B">Focus on watsonx specifics</text>

    <!-- watsonx daily -->
    <rect x="400" y="270" width="170" height="180" rx="10" fill="#ffffff" stroke="#009E60" stroke-width="2"/>
    <text x="485" y="290" font-size="12" font-weight="700" fill="#009E60">watsonx daily</text>
    <text x="485" y="316">Appendix D — Cheatsheet</text>
    <text x="485" y="332">Appendix B — Mock</text>
    <text x="485" y="356" font-style="italic">Revisit any chapter</text>
    <text x="485" y="372" font-style="italic">scored &lt; 70%</text>
    <text x="485" y="416" font-style="italic">→ Appendices E, F</text>
    <text x="485" y="436" font-size="9" fill="#525F6B">Practitioner refresh</text>

    <!-- 2-week sprint -->
    <rect x="590" y="270" width="190" height="180" rx="10" fill="#ffffff" stroke="#DA1E28" stroke-width="2"/>
    <text x="685" y="290" font-size="12" font-weight="700" fill="#DA1E28">2-week sprint</text>
    <text x="685" y="316">Week 1: Ch. 1–3</text>
    <text x="685" y="332">+ practice</text>
    <text x="685" y="356">Week 2: Ch. 4–6</text>
    <text x="685" y="372">+ Appendices B, E</text>
    <text x="685" y="416" font-style="italic">→ Schedule the exam</text>
    <text x="685" y="436" font-size="9" fill="#525F6B">Time-boxed prep</text>
  </g>

  <!-- arrows from diamond to four paths -->
  <line x1="300" y1="200" x2="120" y2="266" stroke="#8A3FFC" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="218" x2="290" y2="266" stroke="#0072C6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="218" x2="490" y2="266" stroke="#009E60" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="200" x2="680" y2="266" stroke="#DA1E28" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
