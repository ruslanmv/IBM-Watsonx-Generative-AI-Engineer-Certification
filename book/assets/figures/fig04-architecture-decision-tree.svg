<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="Helvetica, Arial, sans-serif">
  <rect width="800" height="560" fill="#ffffff"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#003865">Architecture Decision Tree</text>
  <text x="400" y="50" text-anchor="middle" font-size="12" fill="#525F6B">Read every exam scenario against this tree.</text>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0072C6"/>
    </marker>
  </defs>

  <!-- Q1 -->
  <rect x="260" y="76" width="280" height="56" rx="10" fill="#F0F4FA" stroke="#0072C6" stroke-width="2"/>
  <text x="400" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#003865">Need quality output for a task</text>
  <text x="400" y="118" text-anchor="middle" font-size="12" fill="#003865">Is the model's built-in knowledge enough?</text>

  <!-- Yes → Prompting -->
  <line x1="340" y1="132" x2="160" y2="170" stroke="#0072C6" stroke-width="2" marker-end="url(#ar)"/>
  <text x="220" y="156" font-size="11" font-weight="700" fill="#009E60">YES</text>
  <rect x="40" y="172" width="220" height="56" rx="10" fill="#E8F5EC" stroke="#009E60" stroke-width="2"/>
  <text x="150" y="196" text-anchor="middle" font-size="14" font-weight="700" fill="#005934">Prompt Engineering</text>
  <text x="150" y="214" text-anchor="middle" font-size="10" fill="#525F6B">cheapest · fastest · Ch. 2</text>

  <!-- No → Q2 -->
  <line x1="460" y1="132" x2="460" y2="170" stroke="#0072C6" stroke-width="2" marker-end="url(#ar)"/>
  <text x="470" y="156" font-size="11" font-weight="700" fill="#DA1E28">NO</text>
  <rect x="260" y="172" width="280" height="56" rx="10" fill="#F0F4FA" stroke="#0072C6" stroke-width="2"/>
  <text x="400" y="196" text-anchor="middle" font-size="13" font-weight="700" fill="#003865">Need facts from your docs</text>
  <text x="400" y="214" text-anchor="middle" font-size="12" fill="#003865">that change frequently?</text>

  <!-- Yes → RAG -->
  <line x1="540" y1="200" x2="640" y2="200" stroke="#0072C6" stroke-width="2" marker-end="url(#ar)"/>
  <text x="585" y="194" font-size="11" font-weight="700" fill="#009E60">YES</text>
  <rect x="640" y="172" width="140" height="56" rx="10" fill="#F4E9FF" stroke="#8A3FFC" stroke-width="2"/>
  <text x="710" y="196" text-anchor="middle" font-size="14" font-weight="700" fill="#5A189A">RAG</text>
  <text x="710" y="214" text-anchor="middle" font-size="10" fill="#525F6B">no retrain · Ch. 4</text>

  <!-- No → Q3 -->
  <line x1="400" y1="228" x2="400" y2="266" stroke="#0072C6" stroke-width="2" marker-end="url(#ar)"/>
  <text x="410" y="252" font-size="11" font-weight="700" fill="#DA1E28">NO</text>
  <rect x="260" y="268" width="280" height="56" rx="10" fill="#F0F4FA" stroke="#0072C6" stroke-width="2"/>
  <text x="400" y="292" text-anchor="middle" font-size="13" font-weight="700" fill="#003865">Need new behaviour /</text>
  <text x="400" y="310" text-anchor="middle" font-size="13" font-weight="700" fill="#003865">style / output format?</text>

  <!-- Yes → Fine-tuning -->
  <line x1="540" y1="296" x2="640" y2="296" stroke="#0072C6" stroke-width="2" marker-end="url(#ar)"/>
  <text x="585" y="290" font-size="11" font-weight="700" fill="#009E60">YES</text>
  <rect x="640" y="268" width="140" height="56" rx="10" fill="#FFF7E6" stroke="#FFB71B" stroke-width="2"/>
  <text x="710" y="292" text-anchor="middle" font-size="13" font-weight="700" fill="#7A4D00">Fine-Tuning</text>
  <text x="710" y="310" text-anchor="middle" font-size="10" fill="#525F6B">LoRA · InstructLab · Ch. 3</text>

  <!-- No → Q4 -->
  <line x1="400" y1="324" x2="400" y2="362" stroke="#0072C6" stroke-width="2" marker-end="url(#ar)"/>
  <text x="410" y="348" font-size="11" font-weight="700" fill="#DA1E28">NO</text>
  <rect x="260" y="364" width="280" height="56" rx="10" fill="#F0F4FA" stroke="#0072C6" stroke-width="2"/>
  <text x="400" y="388" text-anchor="middle" font-size="13" font-weight="700" fill="#003865">Need multi-step reasoning</text>
  <text x="400" y="406" text-anchor="middle" font-size="13" font-weight="700" fill="#003865">and tool use?</text>

  <!-- Yes → Agents -->
  <line x1="540" y1="392" x2="640" y2="392" stroke="#0072C6" stroke-width="2" marker-end="url(#ar)"/>
  <text x="585" y="386" font-size="11" font-weight="700" fill="#009E60">YES</text>
  <rect x="640" y="364" width="140" height="56" rx="10" fill="#FBEAEC" stroke="#DA1E28" stroke-width="2"/>
  <text x="710" y="388" text-anchor="middle" font-size="14" font-weight="700" fill="#8A0D14">Agents</text>
  <text x="710" y="406" text-anchor="middle" font-size="10" fill="#525F6B">LangChain · MCP · Ch. 6</text>

  <!-- Foot note -->
  <rect x="120" y="460" width="560" height="68" rx="8" fill="#F0F4FA" stroke="#0072C6" stroke-width="1"/>
  <text x="400" y="482" text-anchor="middle" font-size="13" font-weight="700" fill="#003865">Stack-or-not rule</text>
  <text x="400" y="500" text-anchor="middle" font-size="11" fill="#525F6B">You can combine RAG + Fine-tune + Agents — but only when a single approach</text>
  <text x="400" y="514" text-anchor="middle" font-size="11" fill="#525F6B">cannot meet the requirement. The exam prefers the simplest correct choice.</text>
</svg>
