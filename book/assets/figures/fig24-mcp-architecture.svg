<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Helvetica, Arial, sans-serif">
  <rect width="800" height="500" fill="#ffffff"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#003865">Model Context Protocol (MCP)</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#525F6B">One protocol for plugging tools and data into an LLM agent — vendor-neutral.</text>

  <defs>
    <marker id="aMC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0072C6"/>
    </marker>
  </defs>

  <!-- LEFT: With MCP -->
  <rect x="20" y="80" width="430" height="370" rx="14" fill="#E8F5EC" stroke="#009E60" stroke-width="2"/>
  <text x="235" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#005934">With MCP</text>

  <!-- Agent (MCP client) -->
  <rect x="60" y="130" width="180" height="60" rx="10" fill="#003865"/>
  <text x="150" y="156" text-anchor="middle" font-weight="700" font-size="13" fill="#ffffff">Agent (MCP client)</text>
  <text x="150" y="174" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.85">LangChain / LangGraph</text>

  <!-- JSON-RPC label -->
  <text x="320" y="158" text-anchor="middle" font-size="11" font-weight="700" fill="#005934">JSON-RPC</text>
  <text x="320" y="174" text-anchor="middle" font-size="9" fill="#525F6B">(one wire format)</text>

  <line x1="240" y1="160" x2="278" y2="225" stroke="#0072C6" stroke-width="2" marker-end="url(#aMC)"/>
  <line x1="240" y1="160" x2="278" y2="295" stroke="#0072C6" stroke-width="2" marker-end="url(#aMC)"/>
  <line x1="240" y1="160" x2="278" y2="365" stroke="#0072C6" stroke-width="2" marker-end="url(#aMC)"/>

  <!-- MCP servers -->
  <rect x="280" y="206" width="150" height="44" rx="8" fill="#F0F4FA" stroke="#0072C6" stroke-width="1.5"/>
  <text x="355" y="226" text-anchor="middle" font-weight="700" font-size="12">MCP: Postgres</text>
  <text x="355" y="240" text-anchor="middle" font-size="10" fill="#525F6B">resources + tools</text>

  <rect x="280" y="276" width="150" height="44" rx="8" fill="#F0F4FA" stroke="#0072C6" stroke-width="1.5"/>
  <text x="355" y="296" text-anchor="middle" font-weight="700" font-size="12">MCP: Internal CRM</text>
  <text x="355" y="310" text-anchor="middle" font-size="10" fill="#525F6B">resources + tools</text>

  <rect x="280" y="346" width="150" height="44" rx="8" fill="#F0F4FA" stroke="#0072C6" stroke-width="1.5"/>
  <text x="355" y="366" text-anchor="middle" font-weight="700" font-size="12">MCP: Slack</text>
  <text x="355" y="380" text-anchor="middle" font-size="10" fill="#525F6B">resources + tools</text>

  <text x="235" y="424" text-anchor="middle" font-size="11" font-style="italic" fill="#005934">Agent discovers tools at runtime.</text>
  <text x="235" y="440" text-anchor="middle" font-size="11" font-style="italic" fill="#005934">Adding a system = adding a server.</text>

  <!-- RIGHT: Without MCP -->
  <rect x="470" y="80" width="310" height="370" rx="14" fill="#FBEAEC" stroke="#DA1E28" stroke-width="2"/>
  <text x="625" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#8A0D14">Without MCP</text>

  <rect x="500" y="130" width="240" height="60" rx="10" fill="#003865"/>
  <text x="620" y="156" text-anchor="middle" font-weight="700" font-size="13" fill="#ffffff">Agent</text>
  <text x="620" y="174" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.85">+ bespoke tool code per integration</text>

  <!-- bespoke tools -->
  <g font-size="11" fill="#003865">
    <rect x="500" y="206" width="240" height="36" rx="6" fill="#FBEAEC" stroke="#DA1E28"/>
    <text x="620" y="228" text-anchor="middle">@tool def query_postgres(...) :</text>

    <rect x="500" y="248" width="240" height="36" rx="6" fill="#FBEAEC" stroke="#DA1E28"/>
    <text x="620" y="270" text-anchor="middle">@tool def lookup_crm(...) :</text>

    <rect x="500" y="290" width="240" height="36" rx="6" fill="#FBEAEC" stroke="#DA1E28"/>
    <text x="620" y="312" text-anchor="middle">@tool def post_slack(...) :</text>

    <rect x="500" y="332" width="240" height="36" rx="6" fill="#FBEAEC" stroke="#DA1E28"/>
    <text x="620" y="354" text-anchor="middle">+ schema · auth · retries (each)</text>
  </g>

  <text x="625" y="408" text-anchor="middle" font-size="11" font-style="italic" fill="#8A0D14">Every integration is custom code.</text>
  <text x="625" y="424" text-anchor="middle" font-size="11" font-style="italic" fill="#8A0D14">Doubles when the agent framework changes.</text>

  <!-- Bottom -->
  <rect x="40" y="464" width="720" height="0"/>
</svg>
