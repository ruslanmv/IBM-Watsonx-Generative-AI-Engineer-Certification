<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="Helvetica, Arial, sans-serif">
  <rect width="800" height="460" fill="#ffffff"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#003865">The Four Monitoring Pillars</text>
  <text x="400" y="54" text-anchor="middle" font-size="12" fill="#525F6B">Every watsonx deployment is watched along these four dimensions.</text>

  <!-- 4 columns -->
  <g font-size="11" fill="#003865">
    <!-- LATENCY -->
    <rect x="40" y="90" width="170" height="320" rx="10" fill="#F0F4FA" stroke="#0072C6" stroke-width="2"/>
    <rect x="40" y="90" width="170" height="40" rx="10" fill="#0072C6"/>
    <text x="125" y="116" text-anchor="middle" font-weight="700" font-size="14" fill="#ffffff">1 · Latency</text>
    <text x="125" y="158" text-anchor="middle" font-size="11" font-weight="700">Metrics</text>
    <text x="125" y="178" text-anchor="middle" font-size="10" fill="#525F6B">p50 / p95 / p99 ms</text>
    <text x="125" y="194" text-anchor="middle" font-size="10" fill="#525F6B">tokens/sec</text>
    <text x="125" y="210" text-anchor="middle" font-size="10" fill="#525F6B">time-to-first-token</text>
    <text x="125" y="244" text-anchor="middle" font-size="11" font-weight="700">Owner</text>
    <text x="125" y="262" text-anchor="middle" font-size="10" fill="#525F6B">watsonx.ai metrics</text>
    <text x="125" y="278" text-anchor="middle" font-size="10" fill="#525F6B">+ Prometheus</text>
    <text x="125" y="312" text-anchor="middle" font-size="11" font-weight="700">Alert when</text>
    <text x="125" y="330" text-anchor="middle" font-size="10" fill="#525F6B">p95 &gt; SLO 2 min</text>
    <text x="125" y="346" text-anchor="middle" font-size="10" fill="#525F6B">in a row</text>
    <text x="125" y="384" text-anchor="middle" font-size="10" fill="#0072C6" font-style="italic">"Is it fast enough?"</text>

    <!-- COST -->
    <rect x="220" y="90" width="170" height="320" rx="10" fill="#FFF7E6" stroke="#FFB71B" stroke-width="2"/>
    <rect x="220" y="90" width="170" height="40" rx="10" fill="#FFB71B"/>
    <text x="305" y="116" text-anchor="middle" font-weight="700" font-size="14" fill="#7A4D00">2 · Cost</text>
    <text x="305" y="158" text-anchor="middle" font-size="11" font-weight="700">Metrics</text>
    <text x="305" y="178" text-anchor="middle" font-size="10" fill="#525F6B">$ / 1k tokens</text>
    <text x="305" y="194" text-anchor="middle" font-size="10" fill="#525F6B">CUH burn rate</text>
    <text x="305" y="210" text-anchor="middle" font-size="10" fill="#525F6B">$ / user / day</text>
    <text x="305" y="244" text-anchor="middle" font-size="11" font-weight="700">Owner</text>
    <text x="305" y="262" text-anchor="middle" font-size="10" fill="#525F6B">IBM Cloud billing</text>
    <text x="305" y="278" text-anchor="middle" font-size="10" fill="#525F6B">+ tags on endpoints</text>
    <text x="305" y="312" text-anchor="middle" font-size="11" font-weight="700">Alert when</text>
    <text x="305" y="330" text-anchor="middle" font-size="10" fill="#525F6B">forecast &gt; budget</text>
    <text x="305" y="346" text-anchor="middle" font-size="10" fill="#525F6B">for this month</text>
    <text x="305" y="384" text-anchor="middle" font-size="10" fill="#7A4D00" font-style="italic">"Can we afford it?"</text>

    <!-- QUALITY -->
    <rect x="400" y="90" width="170" height="320" rx="10" fill="#E8F5EC" stroke="#009E60" stroke-width="2"/>
    <rect x="400" y="90" width="170" height="40" rx="10" fill="#009E60"/>
    <text x="485" y="116" text-anchor="middle" font-weight="700" font-size="14" fill="#ffffff">3 · Quality</text>
    <text x="485" y="158" text-anchor="middle" font-size="11" font-weight="700">Metrics</text>
    <text x="485" y="178" text-anchor="middle" font-size="10" fill="#525F6B">faithfulness</text>
    <text x="485" y="194" text-anchor="middle" font-size="10" fill="#525F6B">answer relevance</text>
    <text x="485" y="210" text-anchor="middle" font-size="10" fill="#525F6B">thumbs-up rate</text>
    <text x="485" y="244" text-anchor="middle" font-size="11" font-weight="700">Owner</text>
    <text x="485" y="262" text-anchor="middle" font-size="10" fill="#525F6B">watsonx.governance</text>
    <text x="485" y="278" text-anchor="middle" font-size="10" fill="#525F6B">OpenScale evals</text>
    <text x="485" y="312" text-anchor="middle" font-size="11" font-weight="700">Alert when</text>
    <text x="485" y="330" text-anchor="middle" font-size="10" fill="#525F6B">faithfulness drops</text>
    <text x="485" y="346" text-anchor="middle" font-size="10" fill="#525F6B">below baseline</text>
    <text x="485" y="384" text-anchor="middle" font-size="10" fill="#005934" font-style="italic">"Is it still right?"</text>

    <!-- SAFETY -->
    <rect x="580" y="90" width="170" height="320" rx="10" fill="#FBEAEC" stroke="#DA1E28" stroke-width="2"/>
    <rect x="580" y="90" width="170" height="40" rx="10" fill="#DA1E28"/>
    <text x="665" y="116" text-anchor="middle" font-weight="700" font-size="14" fill="#ffffff">4 · Safety</text>
    <text x="665" y="158" text-anchor="middle" font-size="11" font-weight="700">Metrics</text>
    <text x="665" y="178" text-anchor="middle" font-size="10" fill="#525F6B">HAP block rate</text>
    <text x="665" y="194" text-anchor="middle" font-size="10" fill="#525F6B">PII leak attempts</text>
    <text x="665" y="210" text-anchor="middle" font-size="10" fill="#525F6B">jailbreak detections</text>
    <text x="665" y="244" text-anchor="middle" font-size="11" font-weight="700">Owner</text>
    <text x="665" y="262" text-anchor="middle" font-size="10" fill="#525F6B">Granite Guardian</text>
    <text x="665" y="278" text-anchor="middle" font-size="10" fill="#525F6B">+ governance logs</text>
    <text x="665" y="312" text-anchor="middle" font-size="11" font-weight="700">Alert when</text>
    <text x="665" y="330" text-anchor="middle" font-size="10" fill="#525F6B">PII leak detected</text>
    <text x="665" y="346" text-anchor="middle" font-size="10" fill="#525F6B">or jailbreak spike</text>
    <text x="665" y="384" text-anchor="middle" font-size="10" fill="#8A0D14" font-style="italic">"Is it safe?"</text>
  </g>

  <rect x="40" y="424" width="720" height="22" rx="6" fill="#F0F4FA" stroke="#0072C6"/>
  <text x="400" y="440" text-anchor="middle" font-size="11" font-weight="700" fill="#003865">Memorise these four — every "monitoring" exam question maps to one of them.</text>
</svg>
