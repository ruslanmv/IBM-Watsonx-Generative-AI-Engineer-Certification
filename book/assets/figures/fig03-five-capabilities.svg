<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="Helvetica, Arial, sans-serif">
  <rect width="800" height="440" fill="#ffffff"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#003865">The Five Capabilities of LLMs</text>
  <text x="400" y="54" text-anchor="middle" font-size="12" fill="#525F6B">Each watsonx use case maps to exactly one of these.</text>

  <!-- 5 tiles in two rows: 3 top, 2 bottom -->
  <g font-size="11" fill="#003865">

    <!-- Summarization -->
    <rect x="30" y="80" width="240" height="120" rx="10" fill="#ffffff" stroke="#0072C6" stroke-width="2"/>
    <text x="150" y="106" text-anchor="middle" font-size="15" font-weight="700">1. Summarization</text>
    <text x="150" y="128" text-anchor="middle" font-size="11" fill="#525F6B">long text → short text</text>
    <text x="150" y="156" text-anchor="middle" font-size="10" fill="#003865" font-style="italic">e.g., 50-page contract</text>
    <text x="150" y="170" text-anchor="middle" font-size="10" fill="#003865" font-style="italic">→ 5-bullet exec summary</text>
    <rect x="50" y="178" width="200" height="16" rx="3" fill="#F0F4FA"/>
    <text x="150" y="190" text-anchor="middle" font-size="9" fill="#0072C6">granite-3-2-8b-instruct</text>

    <!-- Classification -->
    <rect x="280" y="80" width="240" height="120" rx="10" fill="#ffffff" stroke="#009E60" stroke-width="2"/>
    <text x="400" y="106" text-anchor="middle" font-size="15" font-weight="700">2. Classification</text>
    <text x="400" y="128" text-anchor="middle" font-size="11" fill="#525F6B">text → label / category</text>
    <text x="400" y="156" text-anchor="middle" font-size="10" font-style="italic">e.g., BILLING / TECH / OTHER</text>
    <text x="400" y="170" text-anchor="middle" font-size="10" font-style="italic">for incoming tickets</text>
    <rect x="300" y="178" width="200" height="16" rx="3" fill="#E8F5EC"/>
    <text x="400" y="190" text-anchor="middle" font-size="9" fill="#009E60">granite-3-2-8b-instruct</text>

    <!-- Generation (with sub-types) -->
    <rect x="530" y="80" width="240" height="120" rx="10" fill="#ffffff" stroke="#8A3FFC" stroke-width="2"/>
    <text x="650" y="106" text-anchor="middle" font-size="15" font-weight="700">3. Generation</text>
    <text x="650" y="128" text-anchor="middle" font-size="11" fill="#525F6B">open-ended creation</text>
    <rect x="545" y="140" width="100" height="24" rx="4" fill="#F4E9FF"/>
    <text x="595" y="156" text-anchor="middle" font-size="10" fill="#5A189A">Code</text>
    <rect x="655" y="140" width="100" height="24" rx="4" fill="#F4E9FF"/>
    <text x="705" y="156" text-anchor="middle" font-size="10" fill="#5A189A">Translation</text>
    <rect x="550" y="178" width="200" height="16" rx="3" fill="#F4E9FF"/>
    <text x="650" y="190" text-anchor="middle" font-size="9" fill="#8A3FFC">llama-3-3-70b-instruct</text>

    <!-- Extraction -->
    <rect x="170" y="220" width="240" height="120" rx="10" fill="#ffffff" stroke="#FFB71B" stroke-width="2"/>
    <text x="290" y="246" text-anchor="middle" font-size="15" font-weight="700">4. Extraction</text>
    <text x="290" y="268" text-anchor="middle" font-size="11" fill="#525F6B">unstructured → structured</text>
    <text x="290" y="296" text-anchor="middle" font-size="10" font-style="italic">e.g., invoice PDF → JSON</text>
    <text x="290" y="310" text-anchor="middle" font-size="10" font-style="italic">{vendor, date, total, …}</text>
    <rect x="190" y="318" width="200" height="16" rx="3" fill="#FFF7E6"/>
    <text x="290" y="330" text-anchor="middle" font-size="9" fill="#B97A00">granite-3-2-8b-instruct</text>

    <!-- Q&A -->
    <rect x="430" y="220" width="240" height="120" rx="10" fill="#ffffff" stroke="#DA1E28" stroke-width="2"/>
    <text x="550" y="246" text-anchor="middle" font-size="15" font-weight="700">5. Question Answering</text>
    <text x="550" y="268" text-anchor="middle" font-size="11" fill="#525F6B">closed-book / open-book (RAG)</text>
    <text x="550" y="296" text-anchor="middle" font-size="10" font-style="italic">e.g., "What is our SLA on …?"</text>
    <text x="550" y="310" text-anchor="middle" font-size="10" font-style="italic">grounded in your policy docs</text>
    <rect x="450" y="318" width="200" height="16" rx="3" fill="#FBEAEC"/>
    <text x="550" y="330" text-anchor="middle" font-size="9" fill="#DA1E28">granite + slate-v2 (RAG)</text>
  </g>

  <!-- Footer rule -->
  <rect x="120" y="370" width="560" height="46" rx="6" fill="#F0F4FA" stroke="#0072C6" stroke-width="1"/>
  <text x="400" y="390" text-anchor="middle" font-size="12" font-weight="700" fill="#003865">Exam rule</text>
  <text x="400" y="408" text-anchor="middle" font-size="11" fill="#525F6B">If a scenario mentions "citations" or "from our document corpus" → it's Q&amp;A with RAG (Ch. 4).</text>
</svg>
