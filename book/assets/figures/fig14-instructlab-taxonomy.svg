<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Helvetica, Arial, sans-serif">
  <rect width="800" height="520" fill="#ffffff"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#003865">InstructLab Taxonomy + LAB Methodology</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#525F6B">A handful of seed examples becomes a fine-tuning corpus via synthetic generation.</text>

  <defs>
    <marker id="aI" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0072C6"/>
    </marker>
  </defs>

  <!-- Taxonomy tree (left half) -->
  <g font-size="12" fill="#003865">
    <!-- root -->
    <rect x="60" y="80" width="160" height="40" rx="8" fill="#003865"/>
    <text x="140" y="106" text-anchor="middle" fill="#ffffff" font-weight="700">taxonomy/</text>

    <!-- level 2 -->
    <rect x="20" y="160" width="120" height="36" rx="6" fill="#F0F4FA" stroke="#0072C6"/>
    <text x="80" y="184" text-anchor="middle" font-size="11">knowledge/</text>
    <rect x="150" y="160" width="120" height="36" rx="6" fill="#F0F4FA" stroke="#0072C6"/>
    <text x="210" y="184" text-anchor="middle" font-size="11">compositional/</text>
    <rect x="280" y="160" width="80" height="36" rx="6" fill="#F0F4FA" stroke="#0072C6"/>
    <text x="320" y="184" text-anchor="middle" font-size="10">foundation/</text>

    <!-- lines root -> level 2 -->
    <line x1="120" y1="120" x2="80"  y2="158" stroke="#525F6B"/>
    <line x1="140" y1="120" x2="210" y2="158" stroke="#525F6B"/>
    <line x1="160" y1="120" x2="320" y2="158" stroke="#525F6B"/>

    <!-- level 3: compositional skills -->
    <rect x="120" y="226" width="180" height="36" rx="6" fill="#E8F5EC" stroke="#009E60"/>
    <text x="210" y="250" text-anchor="middle" font-size="11">finance/contracts/</text>
    <line x1="210" y1="196" x2="210" y2="224" stroke="#525F6B"/>

    <!-- level 4: leaf node with seed yaml -->
    <rect x="40" y="296" width="340" height="180" rx="10" fill="#ffffff" stroke="#009E60" stroke-width="2"/>
    <text x="210" y="318" text-anchor="middle" font-size="12" font-weight="700" fill="#005934">qna.yaml (leaf node)</text>
    <text x="56" y="340" font-size="10" font-family="JetBrains Mono, Courier New, monospace" fill="#003865">version: 3</text>
    <text x="56" y="354" font-size="10" font-family="JetBrains Mono, Courier New, monospace" fill="#003865">task_description: |</text>
    <text x="56" y="368" font-size="10" font-family="JetBrains Mono, Courier New, monospace" fill="#003865">  Identify the governing-law clause</text>
    <text x="56" y="382" font-size="10" font-family="JetBrains Mono, Courier New, monospace" fill="#003865">  in a contract.</text>
    <text x="56" y="402" font-size="10" font-family="JetBrains Mono, Courier New, monospace" fill="#003865">seed_examples:</text>
    <text x="56" y="416" font-size="10" font-family="JetBrains Mono, Courier New, monospace" fill="#003865">  - question: "Where is this …?"</text>
    <text x="56" y="430" font-size="10" font-family="JetBrains Mono, Courier New, monospace" fill="#003865">    answer:   "…governed by laws…"</text>
    <text x="56" y="444" font-size="10" font-family="JetBrains Mono, Courier New, monospace" fill="#003865">  - question: "…"</text>
    <text x="210" y="464" text-anchor="middle" font-size="10" font-style="italic" fill="#525F6B">3–5 high-quality seed Q/A pairs</text>
  </g>

  <!-- Right pipeline (LAB) -->
  <g>
    <line x1="380" y1="386" x2="420" y2="386" stroke="#0072C6" stroke-width="2" marker-end="url(#aI)"/>

    <!-- SDG -->
    <rect x="420" y="276" width="180" height="80" rx="10" fill="#F4E9FF" stroke="#8A3FFC" stroke-width="2"/>
    <text x="510" y="302" text-anchor="middle" font-size="13" font-weight="700" fill="#5A189A">Synthetic Data Gen (SDG)</text>
    <text x="510" y="324" text-anchor="middle" font-size="10" fill="#525F6B">teacher LLM (Granite-Lab)</text>
    <text x="510" y="340" text-anchor="middle" font-size="10" fill="#525F6B">→ thousands of new Q/A</text>

    <!-- arrow down -->
    <line x1="510" y1="356" x2="510" y2="380" stroke="#0072C6" stroke-width="2" marker-end="url(#aI)"/>

    <!-- LAB training -->
    <rect x="420" y="384" width="180" height="80" rx="10" fill="#FFF7E6" stroke="#FFB71B" stroke-width="2"/>
    <text x="510" y="410" text-anchor="middle" font-size="13" font-weight="700" fill="#7A4D00">LAB training (phased)</text>
    <text x="510" y="432" text-anchor="middle" font-size="10" fill="#525F6B">replay-buffer phased SFT</text>
    <text x="510" y="448" text-anchor="middle" font-size="10" fill="#525F6B">preserves prior skills</text>

    <line x1="600" y1="424" x2="640" y2="424" stroke="#0072C6" stroke-width="2" marker-end="url(#aI)"/>

    <!-- Output: tuned model -->
    <rect x="640" y="384" width="140" height="80" rx="10" fill="#E8F5EC" stroke="#009E60" stroke-width="2"/>
    <text x="710" y="410" text-anchor="middle" font-size="12" font-weight="700" fill="#005934">Tuned model</text>
    <text x="710" y="430" text-anchor="middle" font-size="10" fill="#525F6B">ready in Tuning</text>
    <text x="710" y="444" text-anchor="middle" font-size="10" fill="#525F6B">Studio / Spaces</text>
  </g>

  <!-- LAB legend -->
  <rect x="420" y="80" width="360" height="170" rx="10" fill="#F0F4FA" stroke="#0072C6" stroke-width="1"/>
  <text x="600" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#003865">LAB = Large-scale Alignment for chatBots</text>
  <g font-size="11" fill="#003865">
    <text x="436" y="134"><tspan font-weight="700">1.</tspan> Author seeds in the taxonomy (≤ 10 per task).</text>
    <text x="436" y="154"><tspan font-weight="700">2.</tspan> Teacher LLM expands them via SDG.</text>
    <text x="436" y="174"><tspan font-weight="700">3.</tspan> Quality filter + (optional) human review.</text>
    <text x="436" y="194"><tspan font-weight="700">4.</tspan> Phased SFT (knowledge → skills → comp.) on the student.</text>
    <text x="436" y="222" font-style="italic" fill="#525F6B">Result: targeted skill added with</text>
    <text x="436" y="238" font-style="italic" fill="#525F6B">no catastrophic forgetting.</text>
  </g>
</svg>
