<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="Helvetica, Arial, sans-serif">
  <rect width="800" height="560" fill="#ffffff"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#003865">Inside a Transformer Block</text>
  <text x="400" y="50" text-anchor="middle" font-size="12" fill="#525F6B">The repeating unit used in every modern LLM (Granite, Llama, Mistral…).</text>

  <defs>
    <marker id="a5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0072C6"/>
    </marker>
  </defs>

  <!-- Pipeline column centred on x=260 -->
  <g font-size="12" fill="#003865">
    <!-- input -->
    <rect x="170" y="80" width="180" height="40" rx="8" fill="#F0F4FA" stroke="#525F6B" stroke-width="1.5"/>
    <text x="260" y="105" text-anchor="middle">Input tokens</text>
    <line x1="260" y1="120" x2="260" y2="140" stroke="#0072C6" stroke-width="2" marker-end="url(#a5)"/>

    <!-- embedding + positional -->
    <rect x="170" y="142" width="180" height="46" rx="8" fill="#F0F4FA" stroke="#0072C6" stroke-width="1.5"/>
    <text x="260" y="162" text-anchor="middle" font-weight="700">Token embedding</text>
    <text x="260" y="178" text-anchor="middle" font-size="11" fill="#525F6B">+ positional encoding</text>
    <line x1="260" y1="188" x2="260" y2="208" stroke="#0072C6" stroke-width="2" marker-end="url(#a5)"/>

    <!-- Multi-head attention -->
    <rect x="150" y="210" width="220" height="60" rx="8" fill="#E8F5EC" stroke="#009E60" stroke-width="2"/>
    <text x="260" y="232" text-anchor="middle" font-weight="700" fill="#005934">Multi-Head Self-Attention</text>
    <text x="260" y="252" text-anchor="middle" font-size="11" fill="#525F6B">every token attends to every other token</text>
    <line x1="260" y1="270" x2="260" y2="290" stroke="#0072C6" stroke-width="2" marker-end="url(#a5)"/>

    <!-- Add &amp; Norm 1 -->
    <rect x="170" y="292" width="180" height="36" rx="8" fill="#F0F4FA" stroke="#525F6B" stroke-width="1.5"/>
    <text x="260" y="316" text-anchor="middle">Add &amp; LayerNorm</text>
    <line x1="260" y1="328" x2="260" y2="348" stroke="#0072C6" stroke-width="2" marker-end="url(#a5)"/>

    <!-- FFN -->
    <rect x="150" y="350" width="220" height="60" rx="8" fill="#F4E9FF" stroke="#8A3FFC" stroke-width="2"/>
    <text x="260" y="372" text-anchor="middle" font-weight="700" fill="#5A189A">Feed-Forward Network</text>
    <text x="260" y="392" text-anchor="middle" font-size="11" fill="#525F6B">expand → activate → project</text>
    <line x1="260" y1="410" x2="260" y2="430" stroke="#0072C6" stroke-width="2" marker-end="url(#a5)"/>

    <!-- Add &amp; Norm 2 -->
    <rect x="170" y="432" width="180" height="36" rx="8" fill="#F0F4FA" stroke="#525F6B" stroke-width="1.5"/>
    <text x="260" y="456" text-anchor="middle">Add &amp; LayerNorm</text>
    <line x1="260" y1="468" x2="260" y2="488" stroke="#0072C6" stroke-width="2" marker-end="url(#a5)"/>

    <!-- Output -->
    <rect x="170" y="490" width="180" height="40" rx="8" fill="#003865"/>
    <text x="260" y="516" text-anchor="middle" fill="#ffffff" font-weight="700">Output (next layer)</text>

    <!-- Residual loops on right -->
    <path d="M 350 230 Q 410 230 410 310 Q 410 320 360 320" stroke="#FFB71B" stroke-width="2" fill="none" marker-end="url(#a5)" stroke-dasharray="5,3"/>
    <path d="M 350 380 Q 410 380 410 460 Q 410 470 360 470" stroke="#FFB71B" stroke-width="2" fill="none" marker-end="url(#a5)" stroke-dasharray="5,3"/>
    <text x="425" y="320" font-size="10" fill="#7A4D00" font-style="italic">residual</text>
    <text x="425" y="470" font-size="10" fill="#7A4D00" font-style="italic">residual</text>
  </g>

  <!-- Side note -->
  <rect x="480" y="160" width="290" height="280" rx="10" fill="#F0F4FA" stroke="#0072C6" stroke-width="1"/>
  <text x="625" y="186" text-anchor="middle" font-size="13" font-weight="700" fill="#003865">Two key inventions</text>
  <g font-size="11" fill="#003865">
    <text x="496" y="216" font-weight="700">Self-attention</text>
    <text x="496" y="234" fill="#525F6B">every token sees every other</text>
    <text x="496" y="250" fill="#525F6B">token in the same step.</text>

    <text x="496" y="282" font-weight="700">Positional encoding</text>
    <text x="496" y="300" fill="#525F6B">attention alone is order-blind;</text>
    <text x="496" y="316" fill="#525F6B">we inject position info so the</text>
    <text x="496" y="332" fill="#525F6B">model knows token order.</text>

    <text x="496" y="364" font-weight="700">Stack N blocks</text>
    <text x="496" y="382" fill="#525F6B">Granite-3 8B uses ~32 blocks;</text>
    <text x="496" y="398" fill="#525F6B">Llama-3 70B uses 80.</text>

    <text x="496" y="426" font-style="italic" fill="#0072C6">Exam tip: you don't need to</text>
    <text x="496" y="442" font-style="italic" fill="#0072C6">implement it — recognise it.</text>
  </g>
</svg>
