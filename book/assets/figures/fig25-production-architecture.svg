<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="Helvetica, Arial, sans-serif">
  <rect width="800" height="540" fill="#ffffff"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#003865">Production Architecture — Enterprise Pattern</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#525F6B">A typical real-world watsonx deployment: chat front, RAG + tools middle, governance everywhere.</text>

  <defs>
    <marker id="aP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0072C6"/>
    </marker>
  </defs>

  <!-- USER -->
  <rect x="40" y="240" width="100" height="60" rx="8" fill="#FFF7E6" stroke="#FFB71B" stroke-width="2"/>
  <text x="90" y="266" text-anchor="middle" font-weight="700" font-size="13" fill="#7A4D00">User</text>
  <text x="90" y="284" text-anchor="middle" font-size="10" fill="#525F6B">web / mobile</text>

  <line x1="140" y1="270" x2="170" y2="270" stroke="#0072C6" stroke-width="2" marker-end="url(#aP)"/>

  <!-- Watson Assistant -->
  <rect x="170" y="240" width="140" height="60" rx="8" fill="#F0F4FA" stroke="#0072C6" stroke-width="2"/>
  <text x="240" y="266" text-anchor="middle" font-weight="700" font-size="12" fill="#003865">Watson Assistant</text>
  <text x="240" y="284" text-anchor="middle" font-size="10" fill="#525F6B">intents + fallback</text>

  <line x1="310" y1="270" x2="340" y2="270" stroke="#0072C6" stroke-width="2" marker-end="url(#aP)"/>

  <!-- LangGraph workflow -->
  <rect x="340" y="200" width="200" height="160" rx="12" fill="#F4E9FF" stroke="#8A3FFC" stroke-width="2"/>
  <text x="440" y="226" text-anchor="middle" font-weight="700" font-size="13" fill="#5A189A">LangGraph / LangChain</text>
  <text x="440" y="240" text-anchor="middle" font-size="10" fill="#525F6B">orchestration</text>

  <rect x="354" y="252" width="172" height="28" rx="4" fill="#ffffff" stroke="#8A3FFC"/>
  <text x="440" y="270" text-anchor="middle" font-size="11" fill="#003865">RAG over Discovery</text>

  <rect x="354" y="286" width="172" height="28" rx="4" fill="#ffffff" stroke="#8A3FFC"/>
  <text x="440" y="304" text-anchor="middle" font-size="11" fill="#003865">MCP → internal CRM</text>

  <rect x="354" y="320" width="172" height="28" rx="4" fill="#ffffff" stroke="#8A3FFC"/>
  <text x="440" y="338" text-anchor="middle" font-size="11" fill="#003865">Granite + Guardian</text>

  <line x1="540" y1="280" x2="570" y2="280" stroke="#0072C6" stroke-width="2" marker-end="url(#aP)"/>

  <!-- watsonx.ai endpoint -->
  <rect x="570" y="240" width="180" height="60" rx="8" fill="#003865"/>
  <text x="660" y="266" text-anchor="middle" font-weight="700" font-size="13" fill="#ffffff">watsonx.ai endpoint</text>
  <text x="660" y="284" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.85">Granite 3 / Llama 3 / Mistral</text>

  <!-- Backend tools above -->
  <rect x="570" y="100" width="180" height="48" rx="8" fill="#F0F4FA" stroke="#0072C6"/>
  <text x="660" y="120" text-anchor="middle" font-weight="700" font-size="12" fill="#003865">watsonx Discovery</text>
  <text x="660" y="136" text-anchor="middle" font-size="10" fill="#525F6B">vector + BM25 hybrid · docs</text>

  <rect x="570" y="160" width="180" height="48" rx="8" fill="#F0F4FA" stroke="#0072C6"/>
  <text x="660" y="180" text-anchor="middle" font-weight="700" font-size="12" fill="#003865">CRM via MCP</text>
  <text x="660" y="196" text-anchor="middle" font-size="10" fill="#525F6B">account · ticket · order data</text>

  <line x1="540" y1="252" x2="570" y2="160" stroke="#009E60" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#aP)"/>
  <line x1="540" y1="240" x2="570" y2="120" stroke="#009E60" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#aP)"/>

  <!-- Granite Guardian sidecar -->
  <rect x="340" y="100" width="200" height="48" rx="8" fill="#FBEAEC" stroke="#DA1E28" stroke-width="2"/>
  <text x="440" y="120" text-anchor="middle" font-weight="700" font-size="12" fill="#8A0D14">Granite Guardian</text>
  <text x="440" y="136" text-anchor="middle" font-size="10" fill="#525F6B">HAP · PII · jailbreak filters</text>

  <line x1="440" y1="148" x2="440" y2="200" stroke="#DA1E28" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#aP)"/>

  <!-- watsonx.governance sidecar (everywhere) -->
  <rect x="40" y="380" width="720" height="60" rx="10" fill="#F0F4FA" stroke="#0072C6" stroke-width="2"/>
  <text x="400" y="406" text-anchor="middle" font-weight="700" font-size="13" fill="#003865">watsonx.governance — OpenScale</text>
  <text x="400" y="424" text-anchor="middle" font-size="11" fill="#525F6B">logs every prompt / response / tool call · evaluates faithfulness, bias, drift · factsheets per version</text>

  <!-- Telemetry arrows from each layer down to governance -->
  <line x1="240" y1="300" x2="240" y2="378" stroke="#525F6B" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="440" y1="360" x2="440" y2="378" stroke="#525F6B" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="660" y1="300" x2="660" y2="378" stroke="#525F6B" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Bottom rule -->
  <rect x="40" y="464" width="720" height="60" rx="10" fill="#FFF7E6" stroke="#FFB71B" stroke-width="1.5"/>
  <text x="400" y="486" text-anchor="middle" font-size="13" font-weight="700" fill="#7A4D00">Pattern to memorise</text>
  <text x="400" y="506" text-anchor="middle" font-size="11" fill="#525F6B">UI → Assistant → Orchestrator → (RAG + MCP) → LLM + Guardian → governance logs.</text>
</svg>
