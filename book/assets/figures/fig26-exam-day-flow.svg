<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="Helvetica, Arial, sans-serif">
  <rect width="800" height="360" fill="#ffffff"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#003865">Exam Day — The 90-Minute Plan</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#525F6B">Three passes. Flag aggressively in pass 1. Commit only when sure.</text>

  <!-- Timeline -->
  <line x1="60" y1="180" x2="740" y2="180" stroke="#525F6B" stroke-width="2"/>

  <!-- Tick marks at 0, 30, 45, 60, 75, 90 -->
  <g font-size="10" fill="#525F6B">
    <line x1="60"  y1="174" x2="60"  y2="186" stroke="#525F6B" stroke-width="2"/>
    <text x="60"  y="206" text-anchor="middle">0</text>
    <line x1="290" y1="174" x2="290" y2="186" stroke="#525F6B" stroke-width="2"/>
    <text x="290" y="206" text-anchor="middle">30</text>
    <line x1="400" y1="174" x2="400" y2="186" stroke="#525F6B" stroke-width="2"/>
    <text x="400" y="206" text-anchor="middle">45</text>
    <line x1="510" y1="174" x2="510" y2="186" stroke="#525F6B" stroke-width="2"/>
    <text x="510" y="206" text-anchor="middle">60</text>
    <line x1="625" y1="174" x2="625" y2="186" stroke="#525F6B" stroke-width="2"/>
    <text x="625" y="206" text-anchor="middle">75</text>
    <line x1="740" y1="174" x2="740" y2="186" stroke="#525F6B" stroke-width="2"/>
    <text x="740" y="206" text-anchor="middle">90 (end)</text>
  </g>
  <text x="400" y="226" text-anchor="middle" font-size="10" fill="#525F6B" font-style="italic">minutes elapsed</text>

  <!-- Pass 1 (0-45) -->
  <rect x="60" y="100" width="340" height="60" rx="8" fill="#0072C6"/>
  <text x="230" y="124" text-anchor="middle" font-weight="700" font-size="14" fill="#ffffff">Pass 1 — sweep for easy wins (45 min)</text>
  <text x="230" y="144" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.9">commit if &lt;60s · flag &amp; skip otherwise · target ~40 of 62 done</text>

  <!-- Pass 2 (45-75) -->
  <rect x="400" y="100" width="225" height="60" rx="8" fill="#8A3FFC"/>
  <text x="513" y="124" text-anchor="middle" font-weight="700" font-size="13" fill="#ffffff">Pass 2 — flagged hard (30 min)</text>
  <text x="513" y="144" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.9">eliminate 2 wrongs · reason between the last 2</text>

  <!-- Pass 3 (75-90) -->
  <rect x="625" y="100" width="115" height="60" rx="8" fill="#009E60"/>
  <text x="682" y="124" text-anchor="middle" font-weight="700" font-size="13" fill="#ffffff">Pass 3 (15)</text>
  <text x="682" y="144" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.9">re-read flagged ·</text>
  <text x="682" y="156" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.9">don't second-guess</text>

  <!-- Mental checkpoints -->
  <g font-size="10" fill="#DA1E28" font-weight="700">
    <text x="290" y="92" text-anchor="middle">checkpoint</text>
    <text x="510" y="92" text-anchor="middle">checkpoint</text>
    <text x="625" y="92" text-anchor="middle">checkpoint</text>
  </g>
  <line x1="290" y1="94" x2="290" y2="100" stroke="#DA1E28" stroke-width="2"/>
  <line x1="510" y1="94" x2="510" y2="100" stroke="#DA1E28" stroke-width="2"/>
  <line x1="625" y1="94" x2="625" y2="100" stroke="#DA1E28" stroke-width="2"/>

  <!-- Bottom rules -->
  <rect x="40" y="260" width="720" height="80" rx="10" fill="#F0F4FA" stroke="#0072C6"/>
  <g font-size="11" fill="#003865">
    <text x="56" y="284" font-weight="700">Three rules</text>
    <text x="56" y="304">• Watch for <tspan font-weight="700">MOST · BEST · LEAST · NOT</tspan> in every question.</text>
    <text x="56" y="320">• If you change an answer in Pass 3, you'd better have a reason — first instinct usually wins.</text>
    <text x="56" y="336">• Never leave a question blank. No penalty for guessing.</text>
  </g>
</svg>
