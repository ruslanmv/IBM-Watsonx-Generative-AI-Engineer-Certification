<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" x2="1"><stop offset="0" stop-color="#0072C6"/><stop offset="1" stop-color="#003865"/></linearGradient>
  </defs>
  <rect width="800" height="360" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#003865">C1000-185 Exam Blueprint</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#525F6B">62 questions · 90 minutes · 44 to pass</text>

  <!-- stacked bar (total width 720, x=40..760) -->
  <!-- Section 1: 15%  -> 108px -->
  <rect x="40"  y="100" width="108" height="64" fill="#0072C6"/>
  <!-- Section 2: 16% -> 115.2px -->
  <rect x="148" y="100" width="115" height="64" fill="#1E88E5"/>
  <!-- Section 3: 31% -> 223.2px (largest) -->
  <rect x="263" y="92"  width="223" height="80" fill="#003865"/>
  <!-- Section 4: 17% -> 122.4px -->
  <rect x="486" y="100" width="122" height="64" fill="#009E60"/>
  <!-- Section 5: 13% -> 93.6px -->
  <rect x="608" y="100" width="94"  height="64" fill="#8A3FFC"/>
  <!-- Section 6: 8%  -> 57.6px -->
  <rect x="702" y="100" width="58"  height="64" fill="#525F6B"/>

  <!-- highlight ribbon on Section 3 -->
  <text x="374" y="86" text-anchor="middle" font-size="11" font-weight="700" fill="#003865">★ LARGEST</text>

  <!-- percentages in bars -->
  <text x="94"  y="138" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">15%</text>
  <text x="205" y="138" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">16%</text>
  <text x="374" y="140" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">31%</text>
  <text x="547" y="138" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">17%</text>
  <text x="655" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">13%</text>
  <text x="731" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">8%</text>

  <!-- labels below -->
  <g font-size="11" fill="#003865" text-anchor="middle">
    <text x="94"  y="196">1. Analyze &amp;</text><text x="94"  y="210">Design</text>
    <text x="205" y="196">2. Prompt</text><text x="205" y="210">Engineering</text>
    <text x="374" y="196" font-weight="700">3. Fine-Tuning</text>
    <text x="547" y="196">4. RAG</text>
    <text x="655" y="196">5. Deploy-</text><text x="655" y="210">ment</text>
    <text x="731" y="196">6. Integ-</text><text x="731" y="210">ration</text>
  </g>

  <!-- chapter mapping below -->
  <g font-size="10" fill="#525F6B" text-anchor="middle">
    <text x="94"  y="234">Ch. 1</text>
    <text x="205" y="234">Ch. 2</text>
    <text x="374" y="234">Ch. 3</text>
    <text x="547" y="234">Ch. 4</text>
    <text x="655" y="234">Ch. 5</text>
    <text x="731" y="234">Ch. 6</text>
  </g>

  <!-- key takeaway -->
  <rect x="160" y="276" width="480" height="60" rx="8" fill="#F0F4FA" stroke="#0072C6" stroke-width="1"/>
  <text x="400" y="298" text-anchor="middle" font-size="13" font-weight="700" fill="#003865">Time-allocation rule</text>
  <text x="400" y="318" text-anchor="middle" font-size="12" fill="#525F6B">Spend hours proportional to weight — fine-tuning is one third of the test.</text>
</svg>
