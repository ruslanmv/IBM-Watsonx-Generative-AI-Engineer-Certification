<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="Helvetica, Arial, sans-serif">
  <rect width="800" height="540" fill="#ffffff"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#003865">LangChain on watsonx — Chain vs Agent</text>
  <text x="400" y="54" text-anchor="middle" font-size="12" fill="#525F6B">Chains are deterministic pipelines. Agents loop with tools until done.</text>

  <defs>
    <marker id="aL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0072C6"/>
    </marker>
  </defs>

  <!-- TOP: Simple chain -->
  <text x="40" y="92" font-size="14" font-weight="700" fill="#003865">Chain (fixed pipeline)</text>

  <rect x="40"  y="110" width="160" height="60" rx="8" fill="#F0F4FA" stroke="#0072C6" stroke-width="2"/>
  <text x="120" y="134" text-anchor="middle" font-weight="700" font-size="12">PromptTemplate</text>
  <text x="120" y="152" text-anchor="middle" font-size="10" font-family="JetBrains Mono, Courier New, monospace" fill="#525F6B">"Classify: {ticket}"</text>

  <line x1="200" y1="140" x2="225" y2="140" stroke="#0072C6" stroke-width="2" marker-end="url(#aL)"/>
  <text x="212" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#0072C6">|</text>

  <rect x="225" y="110" width="160" height="60" rx="8" fill="#003865"/>
  <text x="305" y="134" text-anchor="middle" font-weight="700" font-size="12" fill="#ffffff">WatsonxLLM</text>
  <text x="305" y="152" text-anchor="middle" font-size="10" font-family="JetBrains Mono, Courier New, monospace" fill="#ffffff" opacity="0.85">granite-3-2-8b-instruct</text>

  <line x1="385" y1="140" x2="410" y2="140" stroke="#0072C6" stroke-width="2" marker-end="url(#aL)"/>
  <text x="397" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#0072C6">|</text>

  <rect x="410" y="110" width="160" height="60" rx="8" fill="#F0F4FA" stroke="#0072C6" stroke-width="2"/>
  <text x="490" y="134" text-anchor="middle" font-weight="700" font-size="12">JsonOutputParser</text>
  <text x="490" y="152" text-anchor="middle" font-size="10" fill="#525F6B">→ Python dict</text>

  <line x1="570" y1="140" x2="595" y2="140" stroke="#0072C6" stroke-width="2" marker-end="url(#aL)"/>

  <rect x="595" y="110" width="160" height="60" rx="8" fill="#E8F5EC" stroke="#009E60" stroke-width="2"/>
  <text x="675" y="134" text-anchor="middle" font-weight="700" font-size="12" fill="#005934">Structured result</text>
  <text x="675" y="152" text-anchor="middle" font-size="10" font-family="JetBrains Mono, Courier New, monospace" fill="#525F6B">{"intent": "billing"}</text>

  <rect x="40" y="190" width="720" height="40" rx="8" fill="#F0F4FA" stroke="#0072C6"/>
  <text x="56" y="216" font-size="11" fill="#003865"><tspan font-family="JetBrains Mono, Courier New, monospace">chain = prompt | llm | JsonOutputParser()</tspan></text>

  <!-- Divider -->
  <line x1="40" y1="250" x2="760" y2="250" stroke="#525F6B" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- BOTTOM: Agent loop -->
  <text x="40" y="280" font-size="14" font-weight="700" fill="#003865">Agent (LLM picks the next tool)</text>

  <!-- Agent box -->
  <rect x="320" y="310" width="160" height="80" rx="10" fill="#003865"/>
  <text x="400" y="338" text-anchor="middle" font-weight="700" font-size="13" fill="#ffffff">Agent (LLM)</text>
  <text x="400" y="358" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.85">ReAct: reason → act</text>
  <text x="400" y="374" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.85">→ observe → repeat</text>

  <!-- User input -->
  <rect x="40" y="330" width="160" height="48" rx="8" fill="#FFF7E6" stroke="#FFB71B" stroke-width="2"/>
  <text x="120" y="356" text-anchor="middle" font-weight="700" font-size="12" fill="#7A4D00">User request</text>
  <line x1="200" y1="354" x2="320" y2="350" stroke="#0072C6" stroke-width="2" marker-end="url(#aL)"/>

  <!-- Tools to right -->
  <rect x="560" y="290" width="180" height="40" rx="8" fill="#E8F5EC" stroke="#009E60" stroke-width="2"/>
  <text x="650" y="316" text-anchor="middle" font-weight="700" font-size="12" fill="#005934">Tool: search_kb</text>

  <rect x="560" y="340" width="180" height="40" rx="8" fill="#E8F5EC" stroke="#009E60" stroke-width="2"/>
  <text x="650" y="366" text-anchor="middle" font-weight="700" font-size="12" fill="#005934">Tool: lookup_account</text>

  <rect x="560" y="390" width="180" height="40" rx="8" fill="#E8F5EC" stroke="#009E60" stroke-width="2"/>
  <text x="650" y="416" text-anchor="middle" font-weight="700" font-size="12" fill="#005934">Tool: create_ticket</text>

  <!-- Lines between agent and tools (calls + returns) -->
  <line x1="480" y1="330" x2="560" y2="310" stroke="#0072C6" stroke-width="1.8" marker-end="url(#aL)"/>
  <line x1="480" y1="350" x2="560" y2="360" stroke="#0072C6" stroke-width="1.8" marker-end="url(#aL)"/>
  <line x1="480" y1="370" x2="560" y2="410" stroke="#0072C6" stroke-width="1.8" marker-end="url(#aL)"/>

  <!-- Memory below agent -->
  <rect x="320" y="410" width="160" height="40" rx="8" fill="#F4E9FF" stroke="#8A3FFC" stroke-width="2"/>
  <text x="400" y="436" text-anchor="middle" font-weight="700" font-size="12" fill="#5A189A">Memory (scratchpad)</text>
  <line x1="400" y1="390" x2="400" y2="408" stroke="#8A3FFC" stroke-width="1.5"/>

  <!-- Final output to user -->
  <rect x="40" y="470" width="720" height="50" rx="8" fill="#F0F4FA" stroke="#0072C6"/>
  <text x="400" y="492" text-anchor="middle" font-size="12" font-weight="700" fill="#003865">Loop until: "I have enough to answer" or max_steps</text>
  <text x="400" y="508" text-anchor="middle" font-size="10" fill="#525F6B">Agent returns final answer to the user; trace is logged for governance.</text>
</svg>
