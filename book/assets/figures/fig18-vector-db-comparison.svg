<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Helvetica, Arial, sans-serif">
  <rect width="800" height="500" fill="#ffffff"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#003865">Vector-Database Landscape</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#525F6B">Pick by scale, ops model, and how much your enterprise wants to operate it.</text>

  <!-- Axes -->
  <line x1="100" y1="430" x2="700" y2="430" stroke="#525F6B" stroke-width="1.5"/>
  <line x1="100" y1="430" x2="100" y2="90"  stroke="#525F6B" stroke-width="1.5"/>
  <text x="400" y="460" text-anchor="middle" font-size="12" fill="#003865">scale &amp; concurrency →</text>
  <text x="80"  y="260" text-anchor="middle" font-size="12" fill="#003865" transform="rotate(-90 80 260)">ease of use ↑</text>

  <!-- Quadrant guidelines -->
  <line x1="400" y1="90" x2="400" y2="430" stroke="#F0F4FA" stroke-width="1"/>
  <line x1="100" y1="260" x2="700" y2="260" stroke="#F0F4FA" stroke-width="1"/>

  <!-- Quadrant labels -->
  <text x="250" y="108" text-anchor="middle" font-size="10" fill="#525F6B" font-style="italic">easy · small scale</text>
  <text x="550" y="108" text-anchor="middle" font-size="10" fill="#525F6B" font-style="italic">easy · big scale</text>
  <text x="250" y="448" text-anchor="middle" font-size="10" fill="#525F6B" font-style="italic">DIY · small scale</text>
  <text x="550" y="448" text-anchor="middle" font-size="10" fill="#525F6B" font-style="italic">DIY · big scale</text>

  <!-- Points -->
  <g font-size="11">
    <!-- Chroma: easy, small -->
    <circle cx="190" cy="160" r="14" fill="#009E60" opacity="0.85"/>
    <text x="190" y="165" text-anchor="middle" fill="#ffffff" font-weight="700" font-size="10">Ch</text>
    <text x="190" y="195" text-anchor="middle" fill="#005934" font-weight="700">Chroma</text>
    <text x="190" y="212" text-anchor="middle" fill="#525F6B" font-size="10">in-process · prototyping</text>

    <!-- FAISS: DIY, medium-large -->
    <circle cx="490" cy="370" r="14" fill="#003865"/>
    <text x="490" y="375" text-anchor="middle" fill="#ffffff" font-weight="700" font-size="10">F</text>
    <text x="490" y="404" text-anchor="middle" fill="#003865" font-weight="700">FAISS</text>
    <text x="490" y="420" text-anchor="middle" fill="#525F6B" font-size="10">library · GPU-friendly</text>

    <!-- Milvus: ops, scalable -->
    <circle cx="560" cy="320" r="14" fill="#0072C6"/>
    <text x="560" y="325" text-anchor="middle" fill="#ffffff" font-weight="700" font-size="10">M</text>
    <text x="560" y="354" text-anchor="middle" fill="#003865" font-weight="700">Milvus</text>
    <text x="560" y="370" text-anchor="middle" fill="#525F6B" font-size="10">self-hosted at scale</text>

    <!-- Weaviate: middle -->
    <circle cx="430" cy="220" r="14" fill="#8A3FFC"/>
    <text x="430" y="225" text-anchor="middle" fill="#ffffff" font-weight="700" font-size="10">W</text>
    <text x="430" y="254" text-anchor="middle" fill="#5A189A" font-weight="700">Weaviate</text>
    <text x="430" y="270" text-anchor="middle" fill="#525F6B" font-size="10">cloud / on-prem · modules</text>

    <!-- Pinecone: easy, big -->
    <circle cx="620" cy="180" r="14" fill="#FFB71B"/>
    <text x="620" y="185" text-anchor="middle" fill="#ffffff" font-weight="700" font-size="10">P</text>
    <text x="620" y="214" text-anchor="middle" fill="#7A4D00" font-weight="700">Pinecone</text>
    <text x="620" y="230" text-anchor="middle" fill="#525F6B" font-size="10">SaaS · zero-ops</text>

    <!-- watsonx Discovery: featured -->
    <circle cx="320" cy="180" r="18" fill="#DA1E28"/>
    <text x="320" y="186" text-anchor="middle" fill="#ffffff" font-weight="700" font-size="10">wxD</text>
    <text x="320" y="216" text-anchor="middle" fill="#8A0D14" font-weight="700">watsonx Discovery</text>
    <text x="320" y="232" text-anchor="middle" fill="#525F6B" font-size="10">IBM-native · governed RAG ★</text>
  </g>

  <!-- Legend box bottom -->
  <rect x="100" y="438" width="600" height="0" fill="none"/>
  <rect x="40" y="468" width="720" height="0" fill="none"/>
</svg>
